; CrowPanel Advanced 7" ESP32-P4 HMI Display
; NOTE: ESP32-P4 PlatformIO support is still maturing.
; If build fails, use Arduino IDE with ESP32 board manager v3.x instead.
; Board: "Espressif ESP32-P4 Function EV Board" or custom P4 board
[env:crowpanel]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.psram = enabled

lib_deps =
    lvgl/lvgl@^8.4.0
    lzw655/ESP32_Display_Panel@^1.1.1
    arduino

lib_extra_dirs = 
    ${PROJECT_DIR}/../common

build_flags = 
    -I${PROJECT_DIR}/../common
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_HAS_PSRAM
    -DESP_PANEL_BOARD_USE_CUSTOM=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_TICK_CUSTOM=1
